<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Odoo AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #chat-window { height: 70vh; overflow-y: auto; background: #f8f9fa; border: 1px solid #dee2e6; }
        .typing { font-style: italic; color: #6c757d; }
        .media-container { max-width: 100%; margin-top: 0.5rem; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">要換 logo 位置</h5>
                        <span class="badge bg-light text-primary">GPT-4o</span>
                    </div>
                    <div id="chat-window" class="card-body p-4">
                        <!-- 對話內容將動態插入此處 -->
                    </div>
                    <div class="card-footer bg-white p-3">
                        <div class="input-group">
                            <input type="text" id="userInput" class="form-control" placeholder="請輸入問題..." aria-label="Recipient's username">
                            <button class="btn btn-primary" type="button" id="sendBtn">傳送</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- HTML Templates 區塊 -->
    {% include 'html/message.html' %}
    {% include 'html/image.html' %}
    {% include 'html/youtube_iframe.html' %}

    <script>
        {% include 'javascript/event.js' %}
        {% include 'javascript/tts.js' %}
        {% include 'javascript/chat.js' %}
    </script>
</body>
</html>
