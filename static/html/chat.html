<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Odoo AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #chat-window { height: 70vh; overflow-y: auto; background: #f8f9fa; border: 1px solid #dee2e6; }
        .typing { font-style: italic; color: #6c757d; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">要換 logo 位置</h5>
                        <span class="badge bg-light text-primary">GPT-4o</span>
                    </div>
                    <div id="chat-window" class="card-body p-4">
                        </div>
                    <div class="card-footer bg-white p-3">
                        <div class="input-group">
                            <input type="text" id="userInput" class="form-control" placeholder="請輸入問題..." aria-label="Recipient's username">
                            <button class="btn btn-primary" type="button" id="sendBtn">傳送</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function appendMessage(role, text = "") {
            const div = document.createElement('div');
            div.className = `mb-3 ${role === 'user' ? 'text-end' : 'text-start'}`;
            div.innerHTML = `
                <div class="d-inline-block p-3 rounded-3 ${role === 'user' ? 'bg-primary text-white' : 'bg-white border text-dark'}"
                     style="max-width: 85%; white-space: pre-wrap;">${text}</div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div.querySelector('.rounded-3');
        }

        async function send() {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = '';

            await appendMessage('user', text);
            const aiBubble = await appendMessage('assistant', '...');
            aiBubble.innerText = ''; // 清除 loading 狀態

            const response = await fetch('/ai/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.substring(6));
                            aiBubble.innerText += data.text;
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        } catch(e) {}
                    }
                }
            }
        }

        sendBtn.addEventListener('click', send);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
