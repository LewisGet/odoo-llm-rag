<template id="tpl-msg-user">
    <div class="mb-3 text-end message-row" data-role="user">
        <div class="d-inline-block p-3 rounded-3 bg-primary text-white msg-content" style="max-width: 85%; white-space: pre-wrap; text-align: left;"></div>
    </div>
</template>

<template id="tpl-msg-assistant">
    <div class="mb-3 text-start message-row" data-role="assistant">
        <div class="d-inline-block p-3 rounded-3 bg-white border text-dark msg-content shadow-sm" style="max-width: 85%; white-space: pre-wrap;"></div>
    </div>
</template>
